# ╔══════════════════════════════════════════════════╗
# ║      SUDORU Диалоговая Торговая Система          ║
# ║  Настройки торговцев - редактируй свободно!      ║
# ╚══════════════════════════════════════════════════╝

# Настройки валюты
currency:
  # Тип валюты: ITEM (предмет из инвентаря) или VAULT (требует Vault)
  type: ITEM
  # Если type: ITEM — укажите материал предмета-валюты
  item-material: EMERALD
  # Название предмета-валюты (для отображения)
  item-name: "Изумруд"

# ════════════════════════════════════
# ТОРГОВЦЫ
# Можно добавить сколько угодно секций
# ════════════════════════════════════
traders:

  # ── Торговец 1: Кузнец ──────────────────────────
  blacksmith:
    # Отображаемое имя (поддерживает &-коды цветов)
    display-name: "&8⚒ &7Таинственный &fКузнец"
    # Описание (показывается в заголовке меню)
    description: "&7«Добро пожаловать, путник.\n&7Выбирай товар. Я не жду долго.»"
    # Иконка торговца (голова, которая появляется в меню)
    icon-material: ANVIL
    # Через сколько секунд обновляется ассортимент (0 = никогда)
    refresh-seconds: 300
    # Минимум и максимум предметов в одном ассортименте (от 5 до 8)
    min-items: 5
    max-items: 8
    # Список ВСЕХ возможных предметов торговца
    items:
      - material: DIAMOND_SWORD
        name: "&bАлмазный меч"
        lore:
          - "&7Острый как правда."
        price: 10
        price-range: 3
        chance: 40.0
        amount: 1
        enchantments: []

