name: SUDORUDialoges
version: '1.1.4'
main: org.SUDORU.sUDORUDialoges.SUDORUDialoges
api-version: '1.21'
description: "Диалоговая торговая система SUDORU"
authors: [SUDORU]
softdepend: [PlaceholderAPI]

commands:
  trader:
    description: "Bridge: открыть datapack-меню торговца"
    usage: "/trader [имя]"
    aliases: [trade]
  shopbridge:
    description: "Bridge-команда для связки datapack и плагина"
    usage: "/shopbridge <open|buy|sell> ..."
  villageres:
    description: "Создать NPC Villageres с traderId"
    usage: "/villageres create <traderId> [name...]"
    aliases: [svillager, sudorunpc]
  sellshop:
    description: "Открыть меню продажи предметов (Coins)"
    usage: "/sellshop [open]"
    aliases: [sell, selltrade]
  tradermenu:
    description: "GUI-редактор торговцев (admin)"
    usage: "/tradermenu [id]"
    aliases: [trmenu, shopeditor]
  traderconfig:
    description: "Полное GUI-меню настроек config.yml"
    usage: "/traderconfig [currency|trader <id>|items <id>]"
    aliases: [tconfig, shopconfig]
  traderreload:
    description: "Перезагрузить конфигурацию торговцев"
    usage: "/traderreload"
    aliases: [tradereload]

permissions:
  sudoru.trader:
    description: "Использовать команду /trader"
    default: true
  sudoru.trader.bridge:
    description: "Использовать bridge-команды /shopbridge"
    default: true
  sudoru.sellshop:
    description: "Использовать команду /sellshop (продажа предметов)"
    default: true
  sudoru.villageres.admin:
    description: "Создавать NPC Villageres"
    default: op
  sudoru.trader.admin:
    description: "Управлять торговцами через /tradermenu"
    default: op
  sudoru.trader.reload:
    description: "Перезагрузка конфигурации"
    default: op
  sudoru.trader.bypass:
    description: "Обход ограничений (бесплатная покупка)"
    default: false
